<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai2e | AI to Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-5 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-2xl font-bold text-blue-500 glow-text">Ai2e</h1>
        <div class="px-4 py-1 bg-blue-600 rounded-full text-sm font-medium">Live Test</div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="glass-effect p-8 rounded-3xl shadow-2xl max-w-md w-full">
            <div class="mb-4 inline-block p-3 bg-blue-900/30 rounded-2xl text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            
            <h2 class="text-3xl font-extrabold mb-4">Hello & Welcome!</h2>
            <p class="text-gray-400 mb-6">
                Yeh **Ai2e (AI to Earn)** ka initial testing page hai. Cloudflare deployment check karne ke liye yeh design ready kiya gaya hai.
            </p>

            <div class="space-y-4">
                <div class="p-4 bg-gray-800/50 rounded-xl text-left border border-gray-700">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Status</p>
                    <p class="text-green-400 font-mono">System Online</p>
                </div>
                <div class="p-4 bg-gray-800/50 rounded-xl text-left border border-gray-700">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Environment</p>
                    <p class="text-blue-300 font-mono">Production Mode</p>
                </div>
            </div>

            <button class="mt-8 w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl font-bold hover:opacity-90 transition shadow-lg">
                Explore Dashboard
            </button>
        </div>
    </main>

    <footer class="p-6 text-center text-gray-500 text-sm">
        &copy; 2026 Ai2e Project. Built for the Future.
    </footer>

</body>
</html>
